<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Horror Game</title>
    <link rel="stylesheet" href="css/menu.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <style>
        body { margin: 0; overflow: hidden; }
        #panel { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="panel"></div>
    
    <!-- Главное меню -->
    <div id="main-menu">
        <div class="menu-container">
            <h1 class="game-title">BACKROOMS</h1>
            <button class="start-btn" id="start-btn">START GAME</button>
        </div>
    </div>

    <!-- Меню паузы -->
    <div id="pause-menu" style="display: none;">
        <div class="pause-container">
            <h1>PAUSE</h1>
            <button class="pause-btn resume-btn" id="resume-btn">Resume</button>
            <button class="pause-btn" id="menu-btn">Main Menu</button>
        </div>
    </div>
    
    <script type="module" src="bundle.js"></script>
</body>
</html>
