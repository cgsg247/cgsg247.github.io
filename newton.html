<!DOCTYPE html>
<html>

<head>

    <script type="text/javascript">
        let gl;
        let startTime;

        function initGL(canvas) {
            gl = canvas.getContext("webgl2");
            gl.viewportWidth = canvas.width;
            gl.viewportHeight = canvas.height;
        }

        const shaderFs = `#version 300 es
        precision highp float;
        layout (location = 0) out vec4 o_color;

        uniform float u_time;

        vec2 CmplMulCmpl( vec2 Z1, vec2 Z2 ) 
        {
            vec2 r;
            
            r.x = Z1.x * Z2.x - Z1.y * Z2.y;
            r.y = Z1.x * Z2.y + Z2.x * Z1.y;
            return r;
        }

        float CmplNorm2( vec2 Z )
        {
           return Z.x * Z.x + Z.y * Z.y;
        }
        
        vec2 CmplSubCmpl( vec2 Z1, vec2 Z2 ) 
        {
            vec2 r;
            
            r.x = Z1.x - Z2.x;
            r.y = Z1.y - Z2.y;
            return r;
        }

        vec2 CmplSubVCmpl( vec2 Z1, float A ) 
        {
            vec2 r;
            
            r.x = Z1.x - A;
            r.y = Z1.y;
            return r;
        }

        vec2 CmplConj( vec2 Z1 ) 
        {
            vec2 r;
            
            r.x = Z1.x;
            r.y = -Z1.y;
            return r;
        }

        vec2 CmplMulNum( vec2 Z1, float A ) 
        {
            vec2 r;
            
            r.x = Z1.x * A;
            r.y = Z1.y * A;
            return r;
        }

        vec2 CmplDivCmpl( vec2 Z1, vec2 Z2 ) 
        {
            return CmplMulCmpl(Z1, CmplMulNum(CmplConj(Z2), 1.0 / CmplNorm2(Z2)));
        }

        void main() {
            float n = 0.0;
            float FRAME_W = 800.0, FRAME_H = 800.0;
            float X1 = 2.0, X0 = -2.0, Y1 = 2.0, Y0 = -2.0;
        
            float ys = gl_FragCoord.y;
            float xs = gl_FragCoord.x;

            vec2 Z = vec2(xs * (X1 - X0) / FRAME_W + X0, ys * (Y1 - Y0) / FRAME_H + Y0);

            while (n < 255.0 && (Z.x * Z.x + Z.y * Z.y) < 4.0)
            {
                Z = CmplSubCmpl(Z, CmplDivCmpl(CmplSubVCmpl(CmplMulCmpl(CmplMulCmpl(Z, Z), Z), 1.0), CmplMulNum(CmplMulCmpl(Z, Z), 3.0)));
                n++;
            }
            o_color = vec4(n * 0.03, n * 0.1, n * 0.01, 1);
        }`;

        const shaderVs = `#version 300 es
        precision highp float;

        layout (location = 0) in vec2 a_pos;

        void main() {
            gl_Position = vec4(a_pos, 0, 1);
        }`;

        function getShader(shaderStr, type) {
            const shader = gl.createShader(type);

            gl.shaderSource(shader, shaderStr);
            gl.compileShader(shader);

            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                alert(gl.getShaderInfoLog(shader));
            }

            return shader;
        }

        let u_time_location;
        
        function initShaders() {

            const vs = getShader(shaderFs, gl.FRAGMENT_SHADER);
            const fs = getShader(shaderVs, gl.VERTEX_SHADER);

            const program = gl.createProgram();
            gl.attachShader(program, vs);
            gl.attachShader(program, fs);
            gl.linkProgram(program);

            if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
                alert("Program linkage error");
            }

            gl.useProgram(program);

            u_time_location = gl.getUniformLocation(program, "u_time");
        }

        let vertexBuffer;
        function initBuffer() {            
            vertexBuffer = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuffer);
            vertices = [-1, 3, -1, -1, 3, -1];
            gl.bufferData(
                gl.ARRAY_BUFFER,
                new Float32Array(vertices),
                gl.STATIC_DRAW
            );
        }

        function drawScene() {
            gl.clearColor(0.30, 0.47, 0.8, 1);
            gl.viewport(0, 0, gl.viewportWidth, gl.viewportHeight);
            gl.clear(gl.COLOR_BUFFER_BIT);

            gl.enableVertexAttribArray(0);
            gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

            timeFromStart = new Date().getMilliseconds() - startTime;
            gl.uniform1f(u_time_location, timeFromStart / 1000.0);

            gl.drawArrays(gl.TRIANGLES, 0, 3);
            window.requestAnimationFrame(drawScene);
        }

        function onStart() {
            let canvas = document.getElementById("webgl-canvas");

            canvas.onmousemove = (ev) => {
                console.log(`(${ev.x}, ${ev.y})`);
            };

            initGL(canvas);
            initShaders();
            initBuffer();

            startTime = new Date().getMilliseconds();
            drawScene();
        }
    </script>
</head>

<body onload="onStart();">
    <h2><a href="/index.html">menu</a></h2>    
    <canvas id="webgl-canvas" style="border: none" width="800" height="800"></canvas>
</body>

</html>
