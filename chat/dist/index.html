<!DOCTYPE html>

<head>
    <title>super chat</title>
    <style>
        *,
        html {
            margin: 0;
            padding: 0;
            border: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
        }

        body {
            width: 100%;
            height: 100%;
            position: relative;
            background-color: rgb(236, 152, 42);
        }

        .center {
            width: 100%;
            max-width: 600px;
            margin: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: "Trebuchet MS", Helvetica, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .chat-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 20px;
            font-size: 18px;
            border-radius: 25px;
            outline: none;
            border: none;
        }

        .chat-btn {
            padding: 12px 25px;
            font-size: 18px;
            background-color: #ffffff;
            color: rgb(236, 152, 42);
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-btn:hover {
            background-color: #f0f0f0;
        }

        .chat-box {
            background: rgba(25px, 25px, 25px, 0.1);
            border-radius: 15px;
            padding: 15px;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
        }

        #main {
            list-style-type: none;
            list-style-position: inside;
            font-size: 20px;
        }

        #main li {
            margin-bottom: 8px;
            word-break: break-word;
        }

        .chat-logo {
            width: 300px;
            height: auto;
            border-radius: 24px;
        }
    </style>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="center">
        <div>
            <img src="logo.png" alt="AA3-Chat logo" class="chat-logo">
        </div>

        <h1>AA3-Chat</h1>

        <div id="connectionStatus" style="font-size: 18px; margin-bottom: 15px; font-weight: bold; color: #ffffff;">
            Подключение к серверу...
        </div>

        <div class="chat-form">
            <input type="text" id="myInput" class="chat-input" placeholder="Введите имя...">
            <button id="sendBtn" class="chat-btn">Отправить</button>
        </div>

        <div class="chat-box">
            <ul id="main"></ul>
        </div>
    </div>
    <script src="./bundle.js"></script>

</body>
